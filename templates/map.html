<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#181b22">
<title>CatchingApril</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #181b22;
    --ink: #e9eaee;
    --muted: #8b8f99;
    --accent: #ff7a4a;        /* warm orange = the cat's trail */
    --accent-2: #4ad6ff;
    --border: #262a33;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, ui-sans-serif, system-ui, "Segoe UI", sans-serif;
    -webkit-tap-highlight-color: transparent;
    -webkit-text-size-adjust: 100%;
  }
  body {
    overscroll-behavior-y: none;      /* prevent rubber-band on iOS */
    display: flex; flex-direction: column;
    height: 100dvh;                   /* dynamic viewport — accounts for mobile URL bar */
  }

  /* ===== Top bar (header) ===== */
  .top-bar {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: max(8px, env(safe-area-inset-top)) 14px 10px 14px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .top-bar .row {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .top-bar h1 {
    font-size: 16px; margin: 0; font-weight: 600; letter-spacing: .3px;
    flex: 1; white-space: nowrap;
  }
  .top-bar h1 span { color: var(--accent); }
  #status {
    color: var(--muted); font-size: 12px;
    text-align: right; flex-shrink: 0;
  }

  /* Mode toggle — segmented control */
  .segmented {
    display: inline-flex;
    background: #11141a;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 2px;
    gap: 2px;
  }
  .segmented .seg {
    border: none; background: transparent; color: var(--muted);
    padding: 8px 14px; font-size: 13px;
    border-radius: 8px; min-height: 38px;
    cursor: pointer;
    transition: background .12s, color .12s;
  }
  .segmented .seg.active {
    background: var(--accent); color: #1a0f08; font-weight: 600;
  }

  /* Time preset chips */
  .chips {
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .chip {
    background: #11141a; color: var(--ink);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 8px 14px; font-size: 13px;
    min-height: 38px;
    cursor: pointer;
    white-space: nowrap;
  }
  .chip.active {
    background: var(--accent); color: #1a0f08;
    border-color: var(--accent); font-weight: 600;
  }

  /* Custom range row (hidden unless Custom chip is active) */
  .custom-row {
    display: flex; gap: 8px; align-items: stretch; flex-wrap: wrap;
  }
  .custom-row[hidden] { display: none; }
  input[type="datetime-local"], select {
    background: #11141a; color: var(--ink); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 10px; font-size: 14px;
    min-height: 40px;
  }
  .custom-row input[type="datetime-local"] {
    flex: 1; min-width: 140px;
  }
  .btn-primary {
    background: var(--accent); color: #1a0f08;
    border: 1px solid var(--accent); border-radius: 8px;
    padding: 10px 18px; font-size: 14px; font-weight: 600;
    min-height: 40px; cursor: pointer;
  }

  /* Map gets a fixed fraction of the viewport; checkins (flex:1) takes the
     rest. Using svh (small viewport) keeps the map a stable size when the
     mobile URL bar toggles. */
  #map { width: 100%; height: 50svh; position: relative; flex: 0 0 auto; }

  /* ===== Mobile tweaks (narrow phones) ===== */
  @media (max-width: 640px) {
    .top-bar h1 { font-size: 15px; }
    .top-bar .row { gap: 6px; }
    .segmented { flex: 1; }                  /* fill the row width */
    .segmented .seg { flex: 1; padding: 10px 8px; }
    .chips {
      width: 100%; overflow-x: auto; flex-wrap: nowrap;
      scrollbar-width: none; -ms-overflow-style: none;
      padding-bottom: 2px;                   /* room for scroll cue */
    }
    .chips::-webkit-scrollbar { display: none; }
    .custom-row input[type="datetime-local"] { font-size: 16px; min-width: 0; }
    .btn-primary { flex: 1 0 100%; }         /* full-width Update on mobile */
    #map { height: 42svh; }
  }

  /* ===== Check-ins table (below map) ===== */
  #checkins {
    /* flex:1 takes whatever vertical space the top-bar + map leave behind. */
    flex: 1; min-height: 0;
    overflow-y: auto;
    background: var(--bg);
    border-top: 1px solid var(--border);
    /* Padding for iPhone home indicator so the last row isn't under it.
       The playback bar (when visible) overlays the bottom anyway. */
    padding-bottom: env(safe-area-inset-bottom);
  }
  #checkins .header {
    position: sticky; top: 0; z-index: 2;
    background: var(--panel);
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: baseline; gap: 10px;
    font-size: 13px; color: var(--muted);
  }
  #checkins .header strong { color: var(--ink); font-size: 14px; }
  #checkins table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  #checkins thead th {
    position: sticky; top: 41px; z-index: 1;
    background: var(--panel);
    color: var(--muted);
    text-align: left;
    font-weight: 500;
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
  }
  #checkins tbody td {
    padding: 10px 14px;
    border-bottom: 1px solid #1c2029;
    font-variant-numeric: tabular-nums;
  }
  #checkins tbody tr {
    cursor: pointer;
    transition: background .12s;
  }
  #checkins tbody tr:hover { background: #1a1e26; }
  #checkins tbody tr.active {
    background: rgba(255, 122, 74, 0.12);
    border-left: 3px solid var(--accent);
  }
  #checkins tbody tr.active td:first-child { padding-left: 11px; }
  #checkins .empty {
    padding: 24px 14px;
    color: var(--muted);
    text-align: center;
    font-size: 13px;
  }
  #checkins .coords { color: var(--muted); font-size: 11px; }

  /* ===== Playback bar (floats over map) ===== */
  .playback {
    position: fixed;
    left: 12px; right: 12px;
    bottom: calc(12px + env(safe-area-inset-bottom));   /* clears iPhone home indicator */
    background: rgba(24, 27, 34, 0.88);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 14px;
    display: flex; gap: 14px; align-items: center;
    box-shadow: 0 12px 36px rgba(0,0,0,0.45);
    z-index: 5;
    transition: opacity .2s, transform .2s;
  }
  .playback.hidden { opacity: 0; transform: translateY(8px); pointer-events: none; }
  .playback .play {
    width: 40px; height: 40px; border-radius: 50%; padding: 0; flex-shrink: 0;
    background: var(--accent); color: #1a0f08; border-color: var(--accent);
    font-size: 14px; font-weight: 800;
  }
  .playback .scrub { flex: 1; min-width: 80px; display: flex; align-items: center; }
  .playback input[type="range"] {
    width: 100%; -webkit-appearance: none; appearance: none;
    height: 6px; border-radius: 3px; background: #2c313b; outline: none; margin: 0;
    background-image: linear-gradient(var(--accent), var(--accent));
    background-size: var(--progress, 0%) 100%;
    background-repeat: no-repeat;
  }
  .playback input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 18px; height: 18px; border-radius: 50%;
    background: #fff; border: 3px solid var(--accent); cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }
  .playback input[type="range"]::-moz-range-thumb {
    width: 18px; height: 18px; border-radius: 50%;
    background: #fff; border: 3px solid var(--accent); cursor: pointer;
  }
  .playback .time { font-variant-numeric: tabular-nums; flex-shrink: 0; text-align: right; }
  .playback .time .ts  { font-size: 13px; font-weight: 600; color: var(--ink); }
  .playback .time .idx { font-size: 11px; color: var(--muted); display: block; margin-top: 1px; }
  .playback select.speed {
    background: #11141a; color: var(--ink); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 8px; font-size: 12px; flex-shrink: 0;
  }
</style>
</head>
<body>
  <header class="top-bar">
    <div class="row">
      <h1>🐈 Catching<span>April</span></h1>
      <span id="status">—</span>
    </div>
    <div class="row">
      <div class="segmented" role="tablist" aria-label="View mode">
        <button id="btnPath"  class="seg active" role="tab">Path</button>
        <button id="btnHeat"  class="seg"        role="tab">Heat</button>
        <button id="btnPings" class="seg"        role="tab">Pings</button>
      </div>
    </div>
    <div class="row chips" role="tablist" aria-label="Time range">
      <button class="chip" data-preset="1h">1h</button>
      <button class="chip" data-preset="6h">6h</button>
      <button class="chip active" data-preset="24h">24h</button>
      <button class="chip" data-preset="today">Today</button>
      <button class="chip" data-preset="custom">Custom…</button>
    </div>
    <div class="row custom-row" id="customRange" hidden>
      <input type="datetime-local" id="start" aria-label="From">
      <input type="datetime-local" id="end"   aria-label="To">
      <button id="btnReload" class="btn-primary">Update</button>
    </div>
  </header>
  <div id="map"></div>
  <section id="checkins">
    <div class="header">
      <strong>Check-ins</strong>
      <span id="checkinsCount">—</span>
      <span style="margin-left:auto;">newest first</span>
    </div>
    <table>
      <thead>
        <tr>
          <th>When</th>
          <th>Accuracy</th>
          <th>Coordinates</th>
        </tr>
      </thead>
      <tbody id="checkinsBody"></tbody>
    </table>
    <div id="checkinsEmpty" class="empty" style="display:none;">
      No check-ins in this window.
    </div>
  </section>
  <div id="playback" class="playback hidden">
    <button id="btnPlay" class="play" title="Play / pause">▶</button>
    <div class="scrub">
      <input type="range" id="scrubber" min="0" max="0" value="0" step="1">
    </div>
    <div class="time">
      <span class="ts"  id="curTs">—</span>
      <span class="idx" id="curIdx">0 / 0</span>
    </div>
    <select id="speed" class="speed" title="Playback speed">
      <option value="400">0.5×</option>
      <option value="200">1×</option>
      <option value="100" selected>2×</option>
      <option value="50">4×</option>
      <option value="25">8×</option>
      <option value="10">20×</option>
    </select>
  </div>

<script>
  // ===== CONFIG =====
  // Injected by server.py via Jinja from the GOOGLE_MAPS_API_KEY env var.
  const GOOGLE_MAPS_KEY = "{{ google_maps_key }}";
  // Default centre — 902 Banklick St, Covington KY area
  const HOME = { lat: 39.0853, lng: -84.5085 };

  let map, polyline, heatmap;
  let markers = [];
  let mode = "path";

  // Playback state
  let currentPath = [];      // array of {lat,lng,ts,acc}
  let playbackMarker = null; // the animated "cat is here" dot
  let playTimer = null;      // setInterval id while playing
  let playIdx = 0;

  function pad(n){ return String(n).padStart(2,"0"); }
  function toLocalInput(d){
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }
  function fromLocalInput(v){ return new Date(v); }

  function clearOverlays(){
    if (polyline) polyline.setMap(null);
    if (heatmap)  heatmap.setMap(null);
    if (playbackMarker) playbackMarker.setMap(null);
    markers.forEach(m => m.setMap(null));
    polyline = heatmap = playbackMarker = null;
    markers = [];
    stopPlay();
  }

  // Render the check-ins table in reverse-chronological order (newest first).
  // Row index attribute stores the position in currentPath (which is ordered
  // oldest → newest), so we can map clicks back to setPlaybackIndex.
  function renderCheckins(path){
    const tbody = document.getElementById("checkinsBody");
    const empty = document.getElementById("checkinsEmpty");
    const count = document.getElementById("checkinsCount");
    tbody.innerHTML = "";
    if (!path.length) {
      empty.style.display = "block";
      count.textContent = "0 in window";
      return;
    }
    empty.style.display = "none";
    count.textContent = `${path.length} in window`;

    const frag = document.createDocumentFragment();
    // Iterate newest → oldest while keeping the original currentPath index
    // (path is ordered oldest → newest) so row clicks line up with playback.
    for (let i = path.length - 1; i >= 0; i--) {
      const p = path[i];
      const tr = document.createElement("tr");
      tr.dataset.idx = i;
      tr.innerHTML =
        `<td>${new Date(p.ts).toLocaleString()}</td>` +
        `<td>±${Math.round(p.acc || 0)}m</td>` +
        `<td class="coords">${p.lat.toFixed(5)}, ${p.lng.toFixed(5)}</td>`;
      tr.addEventListener("click", () => {
        stopPlay();
        setPlaybackIndex(i);
        // Pan the map to the selected point without zooming out
        if (map) map.panTo({ lat: p.lat, lng: p.lng });
      });
      frag.appendChild(tr);
    }
    tbody.appendChild(frag);
  }

  // Move the .active highlight on the table when the playback index changes.
  // Only scroll into view when transitioning from a previous active row (i.e.,
  // user is actively scrubbing/playing). Skip on initial render so the table
  // stays at the top showing the newest entries — otherwise auto-set to index
  // 0 (oldest, drawn at the bottom of the table) would scroll us to the bottom.
  function highlightCheckinRow(idx){
    const tbody = document.getElementById("checkinsBody");
    const prev = tbody.querySelector("tr.active");
    if (prev) prev.classList.remove("active");
    const row = tbody.querySelector(`tr[data-idx="${idx}"]`);
    if (row) {
      row.classList.add("active");
      if (prev) row.scrollIntoView({ block: "nearest", behavior: "smooth" });
    }
  }

  async function load(){
    const startEl = document.getElementById("start");
    const endEl   = document.getElementById("end");
    const start = fromLocalInput(startEl.value).toISOString();
    const end   = fromLocalInput(endEl.value).toISOString();

    const r = await fetch(`/api/locations?start=${encodeURIComponent(start)}&end=${encodeURIComponent(end)}`);
    const { points } = await r.json();

    document.getElementById("status").textContent =
      `${points.length} pings · ${new Date(start).toLocaleString()} → ${new Date(end).toLocaleString()}`;

    clearOverlays();
    const panel = document.getElementById("playback");
    if (!points.length) {
      panel.classList.add("hidden");
      currentPath = [];
      renderCheckins([]);
      return;
    }

    const path = points.map(p => ({ lat: p.lat, lng: p.lon, ts: p.ts, acc: p.accuracy_m }));
    currentPath = path;
    renderCheckins(path);

    if (mode === "path") {
      polyline = new google.maps.Polyline({
        path, map,
        strokeColor: "#ff7a4a", strokeOpacity: 0.95, strokeWeight: 4,
        icons: [{ icon: { path: google.maps.SymbolPath.FORWARD_CLOSED_ARROW, scale: 2.5,
                          strokeColor:"#ffd1bd" }, offset: "100%" }],
      });
      // Start & end pins
      markers.push(new google.maps.Marker({
        position: path[0], map, label: { text:"S", color:"#fff", fontSize:"11px" },
        title: "Start: " + new Date(path[0].ts).toLocaleString(),
      }));
      markers.push(new google.maps.Marker({
        position: path[path.length-1], map, label: { text:"E", color:"#fff", fontSize:"11px" },
        title: "End: " + new Date(path[path.length-1].ts).toLocaleString(),
      }));
    } else if (mode === "heat") {
      heatmap = new google.maps.visualization.HeatmapLayer({
        data: path.map(p => new google.maps.LatLng(p.lat, p.lng)),
        radius: 28, opacity: 0.75, map,
      });
    } else if (mode === "pings") {
      path.forEach((p, i) => {
        const dot = new google.maps.Marker({
          position: p, map,
          icon: { path: google.maps.SymbolPath.CIRCLE, scale: 5,
                  fillColor: "#ff7a4a", fillOpacity: 0.9, strokeColor:"#1a0f08", strokeWeight:1 },
          title: `${new Date(p.ts).toLocaleString()}  ±${Math.round(p.acc||0)}m`,
        });
        markers.push(dot);
      });
    }

    // Fit map to data
    const bounds = new google.maps.LatLngBounds();
    path.forEach(p => bounds.extend(p));
    map.fitBounds(bounds, 60);

    // ===== Playback =====
    playbackMarker = new google.maps.Marker({
      position: path[0], map, zIndex: 9999,
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 10, fillColor: "#ff7a4a", fillOpacity: 0.95,
        strokeColor: "#fff", strokeWeight: 3,
      },
      title: "Playback",
    });
    const scrubber = document.getElementById("scrubber");
    scrubber.max = String(path.length - 1);
    panel.classList.remove("hidden");
    setPlaybackIndex(0);
  }

  function setPlaybackIndex(i){
    if (!currentPath.length) return;
    playIdx = Math.max(0, Math.min(currentPath.length - 1, i|0));
    const p = currentPath[playIdx];
    if (playbackMarker) playbackMarker.setPosition({ lat: p.lat, lng: p.lng });

    const scrubber = document.getElementById("scrubber");
    scrubber.value = String(playIdx);
    const pct = currentPath.length > 1 ? (playIdx / (currentPath.length - 1)) * 100 : 0;
    scrubber.style.setProperty("--progress", pct + "%");
    scrubber.style.backgroundSize = pct + "% 100%";

    document.getElementById("curTs").textContent  = new Date(p.ts).toLocaleString();
    document.getElementById("curIdx").textContent = `${playIdx + 1} / ${currentPath.length}`;

    highlightCheckinRow(playIdx);
  }

  function startPlay(){
    if (!currentPath.length) return;
    if (playIdx >= currentPath.length - 1) setPlaybackIndex(0);  // loop from start
    const ms = parseInt(document.getElementById("speed").value, 10);
    document.getElementById("btnPlay").textContent = "❚❚";
    playTimer = setInterval(() => {
      if (playIdx >= currentPath.length - 1) { stopPlay(); return; }
      setPlaybackIndex(playIdx + 1);
    }, ms);
  }

  function stopPlay(){
    if (playTimer) { clearInterval(playTimer); playTimer = null; }
    const btn = document.getElementById("btnPlay");
    if (btn) btn.textContent = "▶";
  }

  function togglePlay(){ playTimer ? stopPlay() : startPlay(); }

  function setMode(m){
    mode = m;
    for (const id of ["btnPath","btnHeat","btnPings"]) {
      document.getElementById(id).classList.toggle("active",
        (id === "btnPath" && m === "path") ||
        (id === "btnHeat" && m === "heat") ||
        (id === "btnPings" && m === "pings"));
    }
    load();
  }

  // Apply a time-window preset chip.
  // 'custom' just reveals the datetime pickers + Update button without firing
  // a load() — the user edits the range then clicks Update. Other presets
  // populate the hidden inputs and reload immediately.
  function setPreset(key){
    for (const c of document.querySelectorAll(".chip")) {
      c.classList.toggle("active", c.dataset.preset === key);
    }
    const customRow = document.getElementById("customRange");
    if (key === "custom") { customRow.hidden = false; return; }
    customRow.hidden = true;

    const now = new Date();
    let start;
    if      (key === "1h")    start = new Date(now.getTime() - 1  * 3600 * 1000);
    else if (key === "6h")    start = new Date(now.getTime() - 6  * 3600 * 1000);
    else if (key === "24h")   start = new Date(now.getTime() - 24 * 3600 * 1000);
    else if (key === "today") start = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    else return;

    document.getElementById("start").value = toLocalInput(start);
    document.getElementById("end").value   = toLocalInput(now);
    load();
  }

  function initMap(){
    map = new google.maps.Map(document.getElementById("map"), {
      center: HOME, zoom: 17, mapTypeId: "hybrid",
      streetViewControl: false, fullscreenControl: false, mapTypeControl: true,
      // Subtle dark styling on roadmap view; hybrid is satellite + labels by default.
      styles: [{ elementType: "labels.text.fill", stylers: [{ color: "#e9eaee" }] }],
    });

    document.getElementById("btnReload").onclick = load;
    document.getElementById("btnPath").onclick   = () => setMode("path");
    document.getElementById("btnHeat").onclick   = () => setMode("heat");
    document.getElementById("btnPings").onclick  = () => setMode("pings");

    // Time-window chips
    for (const c of document.querySelectorAll(".chip")) {
      c.addEventListener("click", () => setPreset(c.dataset.preset));
    }

    // Playback controls
    document.getElementById("btnPlay").onclick   = togglePlay;
    document.getElementById("scrubber").oninput  = (e) => {
      stopPlay();
      setPlaybackIndex(parseInt(e.target.value, 10));
    };
    document.getElementById("speed").onchange = () => {
      if (playTimer) { stopPlay(); startPlay(); }   // re-arm at new speed
    };
    // Keyboard: space = play/pause, arrows = step
    document.addEventListener("keydown", (e) => {
      if (e.target.tagName === "INPUT" || e.target.tagName === "SELECT") return;
      if (e.code === "Space") { e.preventDefault(); togglePlay(); }
      else if (e.code === "ArrowRight") { stopPlay(); setPlaybackIndex(playIdx + 1); }
      else if (e.code === "ArrowLeft")  { stopPlay(); setPlaybackIndex(playIdx - 1); }
    });

    // Default to "last 24h" — also activates the matching chip and triggers load.
    setPreset("24h");
  }
</script>
<script async
  src="https://maps.googleapis.com/maps/api/js?key={{ google_maps_key }}&libraries=visualization&callback=initMap"></script>
</body>
</html>
